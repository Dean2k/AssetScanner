name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            src: AssetScanner.Desktop.exe
            dst: AssetScanner.exe
            archive: AssetScanner-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            src: AssetScanner.Desktop
            dst: AssetScanner
            archive: AssetScanner-linux-x64.zip
          - os: macos-latest
            rid: osx-x64
            src: AssetScanner.Desktop
            dst: AssetScanner
            archive: AssetScanner-osx-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AssetScanner.sln

      - name: Build
        run: dotnet build AssetScanner.sln --configuration Release --no-restore

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish AssetScanner.Desktop\AssetScanner.Desktop.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            --output .\publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish (Unix)
        if: runner.os != 'Windows'
        run: |
          dotnet publish AssetScanner.Desktop/AssetScanner.Desktop.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --output ./publish \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Rename output
        run: |
          mv ./publish/${{ matrix.src }} ./publish/${{ matrix.dst }}
        shell: bash

      - name: Verify output
        run: |
          ls -la ./publish
          test -f ./publish/${{ matrix.dst }}
        shell: bash

      - name: Package
        run: |
          cd publish
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../${{ matrix.archive }} .
          else
            zip -r ../${{ matrix.archive }} .
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: AssetScanner-*.zip

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Latest build from commit `${{ github.sha }}` on `master`.

            | Platform | Archive |
            |----------|---------|
            | Windows x64 | `AssetScanner-win-x64.zip` |
            | Linux x64 | `AssetScanner-linux-x64.zip` |
            | macOS x64 | `AssetScanner-osx-x64.zip` |

            Self-contained single-file executables — no .NET runtime required.
          draft: false
          prerelease: false
          files: ./artifacts/**/*.zip
          generate_release_notes: true
