name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            src: AssetScanner.Desktop.exe
            dst: AssetScanner.exe
            archive: AssetScanner-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            src: AssetScanner.Desktop
            dst: AssetScanner
            archive: AssetScanner-linux-x64.zip
          - os: macos-latest
            rid: osx-x64
            src: AssetScanner.Desktop
            dst: AssetScanner
            archive: AssetScanner-osx-x64.zip
          - os: macos-latest
            rid: osx-arm64
            src: AssetScanner.Desktop
            dst: AssetScanner
            archive: AssetScanner-osx-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AssetScanner.sln

      - name: Build
        run: dotnet build AssetScanner.sln --configuration Release --no-restore

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish AssetScanner.Desktop\AssetScanner.Desktop.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            --output .\publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish (Unix)
        if: runner.os != 'Windows'
        run: |
          dotnet publish AssetScanner.Desktop/AssetScanner.Desktop.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --output ./publish \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Rename output
        run: |
          mv ./publish/${{ matrix.src }} ./publish/${{ matrix.dst }}
        shell: bash

      - name: Verify output
        run: |
          ls -la ./publish
          test -f ./publish/${{ matrix.dst }}
        shell: bash

      - name: Package
        run: |
          cd publish
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../${{ matrix.archive }} .
          else
            zip -r ../${{ matrix.archive }} .
          fi
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: AssetScanner-*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ./artifacts/**/*.zip
          generate_release_notes: true
